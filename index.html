<style>

}
body[data-theme="rhoads"]{
  --bg:#0a0a0c; --card:#131316; --card2:#1b1b20; --fg:#ffffff; --dim:#94949c;
  --accent:#e23b3b; --line:#232327;
  --shadow:0 10px 30px rgba(0,0,0,.45);
  --band:radial-gradient(circle at 8px 5px, #ffffff 2px, transparent 2.7px) 0 0/26px 10px repeat-x,
         radial-gradient(circle at 20px 7px, #ffffff 1.3px, transparent 1.9px) 0 0/34px 10px repeat-x,
         #151515;
}
body[data-theme="dolphin"]{
  --bg:#f4e6c0; --card:#fffaf0; --card2:#fdf3dd; --fg:#0b6b6b; --dim:#559089;
  --accent:#00a8c6; --line:#e8d9b4;
  --shadow:0 10px 24px rgba(160,120,40,.18);
  --band:radial-gradient(circle at 7px 5px, #ffffff 2px, transparent 2.7px) 0 0/24px 10px repeat-x,
         radial-gradient(circle at 16px 3px, rgba(255,255,255,.75) 1.3px, transparent 1.9px) 0 0/30px 10px repeat-x,
         #7ec8e8;
}
body[data-theme="world"]{
  /* dark wood + billiard ball colors */
  --bg:#20140c; --card:#2a1b10; --card2:#342214; --fg:#f3ead8; --dim:#a8916f;
  --accent:#3fae6a; --line:#3e2a18;
  --shadow:0 10px 30px rgba(0,0,0,.55);
  --band:radial-gradient(circle at 10px 5px, #f2b632 3px, transparent 3.6px) 0 0/60px 10px repeat-x,
         radial-gradient(circle at 25px 5px, #d64541 3px, transparent 3.6px) 0 0/60px 10px repeat-x,
         radial-gradient(circle at 40px 5px, #3b6bd6 3px, transparent 3.6px) 0 0/60px 10px repeat-x,
         radial-gradient(circle at 55px 5px, #8e44ad 3px, transparent 3.6px) 0 0/60px 10px repeat-x,
         #2a5c41;
}
body[data-theme="map"]{
  --bg:#0d0f13; --card:#171a21; --card2:#1f232d; --fg:#eef1f6; --dim:#8b92a1;
  --accent:#ffb020; --line:rgba(255,255,255,.09);
  --shadow:rgba(0,0,0,.55);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; padding:0;}
body{
  background:var(--bg); color:var(--fg);
  font-family:-apple-system, BlinkMacSystemFont, "SF Pro Text", Inter, system-ui, sans-serif;
  padding:calc(env(safe-area-inset-top) + 10px) 14px 44px;
  max-width:560px; margin:0 auto;
  user-select:none; -webkit-user-select:none; touch-action:manipulation;
}
#band{height:10px; border-radius:999px; margin:0 0 10px; background:var(--band);}
header{display:flex; align-items:center; justify-content:flex-start; gap:10px; padding:4px 2px 12px;}
h1{
  font-family:"Archivo Black", -apple-system, system-ui, sans-serif;
  font-size:clamp(20px,6vw,26px); margin:0; line-height:1.15; letter-spacing:.3px;
}
#diffline{
  display:inline-block; font-size:11px; font-weight:700; color:var(--dim);
  border:1px solid var(--line); border-radius:999px; padding:3px 10px;
  margin-top:5px; font-variant-numeric:tabular-nums; letter-spacing:.3px;
}
#btnMap{min-width:48px; padding:0; font-size:20px;}

/* ---------------- overworld ---------------- */
#owWrap{
  position:relative; margin-top:4px; overflow:hidden; border-radius:24px;
  border:1px solid var(--line); box-shadow:0 24px 60px rgba(0,0,0,.5); background:var(--bg);
}
#owHero{
  position:absolute; top:0; left:0; right:0; z-index:4; pointer-events:none;
  padding:16px 18px 26px; background:linear-gradient(180deg, rgba(13,15,19,.94) 40%, rgba(13,15,19,0));
}
#owHero .t{font:800 15px/1 -apple-system, system-ui, sans-serif; letter-spacing:.14em; color:var(--fg);}
#owHero .s{font:500 12px/1.3 -apple-system, system-ui, sans-serif; color:var(--dim); margin-top:5px;}
#owPath{position:absolute; top:0; left:0; z-index:1; pointer-events:none;}
#owPath .dash{animation:owDash 2.4s linear infinite;}
.owWorldBg{position:absolute; left:0; right:0; z-index:0; overflow:hidden; pointer-events:none;}
.owWorldBg.w0{
  background:
    radial-gradient(72% 92% at 50% 55%, rgba(60,38,14,.30), transparent 72%),
    repeating-linear-gradient(90deg, rgba(120,80,30,.06) 0 2px, transparent 2px 30px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.05) 0 1px, transparent 1px 15px),
    linear-gradient(180deg, #ead7ac, #dcc290);
}
.owWorldBg.w1{
  background:
    radial-gradient(120% 60% at 78% 6%, rgba(255,220,150,.10), transparent 55%),
    repeating-linear-gradient(176deg, transparent 0 58px, rgba(150,225,235,.035) 58px 62px, transparent 62px 128px),
    linear-gradient(180deg, #0f4051 0%, #0a2e40 46%, #06202f 100%);
}
.owWorldBg.w2{
  background:
    radial-gradient(90% 60% at 50% 30%, rgba(70,196,122,.06), transparent 60%),
    linear-gradient(180deg, #07130d, #0a1a12);
}
.owWorldBg.w3{
  background:
    radial-gradient(60% 34% at 28% 16%, rgba(255,255,255,.035), transparent 60%),
    radial-gradient(54% 40% at 76% 72%, rgba(0,0,0,.3), transparent 60%),
    linear-gradient(180deg, #1a1c1f, #131418);
}
.owCurb{position:absolute; top:26px; bottom:0; width:13px; border-radius:2px;}
.owCurb.l{left:6px; background:repeating-linear-gradient(135deg, rgba(196,58,48,.22) 0 13px, rgba(232,233,238,.14) 13px 26px);}
.owCurb.r{right:6px; background:repeating-linear-gradient(45deg, rgba(196,58,48,.22) 0 13px, rgba(232,233,238,.14) 13px 26px);}
.owFinale{position:absolute; left:0; bottom:0; width:100%; height:210px; z-index:1; pointer-events:none;}

.owNode{position:absolute; display:flex; flex-direction:column; align-items:center; gap:6px; text-align:center; z-index:3;}
.owNode.unlocked{cursor:pointer;}
.owBadge{font:700 10px/1 ui-monospace, "SF Mono", monospace; letter-spacing:.06em; padding:3px 8px; border-radius:999px; white-space:nowrap;}
.owNode.unlocked .owBadge{color:#1a1206; background:var(--accent); box-shadow:0 2px 6px var(--shadow);}
.owNode.locked .owBadge{color:var(--dim); background:var(--card2); border:1px solid var(--line);}
.owBubble{width:60px; height:60px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:28px;}
.owNode.unlocked .owBubble{background:radial-gradient(120% 120% at 50% 25%, var(--card2), var(--card)); border:3px solid var(--accent); animation:owGlow 3.6s ease-in-out infinite;}
.owNode.locked .owBubble{background:var(--card); border:2px solid var(--line); filter:grayscale(1); opacity:.55; font-size:26px;}
.owTitle{font:700 13.5px/1.2 -apple-system, system-ui, sans-serif; text-wrap:balance;}
.owNode.unlocked .owTitle{color:var(--fg); text-shadow:0 1px 3px rgba(0,0,0,.65);}
.owNode.locked .owTitle{color:var(--dim); text-shadow:0 1px 2px rgba(0,0,0,.6);}
.owSub{font:500 11px/1.2 -apple-system, system-ui, sans-serif; color:var(--dim);}
.owNode.unlocked .owSub{text-shadow:0 1px 2px rgba(0,0,0,.6);}
.owNode.locked .owSub{opacity:.8;}
.owNode.locked{opacity:.82;}
.owNode.boss .owBadge{font-weight:800; letter-spacing:.12em; padding:3px 10px;}
.owNode.boss.unlocked .owBadge{color:#2a0806; background:linear-gradient(180deg,#ffb020,#ff5140); box-shadow:0 2px 8px rgba(255,81,64,.45);}
.owNode.boss.locked .owBadge{border:1px solid rgba(255,81,64,.4);}
.owNode.boss .owBubble{width:74px; height:74px; font-size:34px;}
.owNode.boss.unlocked .owBubble{background:radial-gradient(120% 120% at 50% 22%,#2a2230,#171018); border:4px solid #ff5140; animation:owBossGlow 2.6s ease-in-out infinite;}
.owNode.boss.locked .owBubble{background:var(--card); border:3px solid rgba(255,81,64,.5); filter:grayscale(.7); opacity:.62; font-size:32px;}
.owNode.boss .owTitle{font:800 14px/1.2 -apple-system, system-ui, sans-serif;}
.owNode.boss.unlocked .owSub{color:#ff8f80;}
@keyframes owDash{ to{ stroke-dashoffset:-28; } }
@keyframes owGlow{
  0%,100%{ box-shadow:0 6px 16px var(--shadow), 0 0 0 6px rgba(255,176,32,.10); }
  50%{ box-shadow:0 6px 20px var(--shadow), 0 0 0 8px rgba(255,176,32,.18); }
}
@keyframes owBossGlow{
  0%,100%{ box-shadow:0 6px 18px var(--shadow), 0 0 0 4px rgba(255,81,64,.9), 0 0 0 9px rgba(255,81,64,.14); }
  50%{ box-shadow:0 6px 24px var(--shadow), 0 0 0 4px rgba(255,81,64,1), 0 0 0 12px rgba(255,81,64,.22); }

.card{
  background:var(--card); border:1px solid var(--line); border-radius:18px;
  padding:14px; margin-top:14px; box-shadow:var(--shadow);
}
.card h3{margin:0 0 10px; font-size:11px; color:var(--dim); letter-spacing:1.4px; text-transform:uppercase; font-weight:700;}

  background:var(--card2); border-radius:12px;}
canvas#sectionsStrip{width:100%; display:block; margin-bottom:6px;}
#loopInfo{font-size:12px; color:var(--dim); font-variant-numeric:tabular-nums; min-height:16px; margin-top:8px; text-align:center;}
#songMeta{font-size:10.5px; color:var(--dim); opacity:.65; font-variant-numeric:tabular-nums; text-align:center; margin-top:2px;}
.row{display:flex; gap:8px; align-items:center;}
.row + .row{margin-top:8px;}
button{
  background:var(--card2); color:var(--fg); border:1px solid var(--line);
  border-radius:13px; font:inherit; font-size:15px; font-weight:600;
  padding:0 14px; min-height:48px; min-width:48px; cursor:pointer;
  transition:transform .06s, opacity .15s;
}
button:active{transform:scale(.965);}
button.on{border-color:var(--accent); color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent);}
#btnPlay{
  flex:1; background:var(--fg); color:var(--bg); border-color:var(--fg);
  font-size:17px; font-weight:800; min-height:54px; border-radius:15px;
}
.nudge button{flex:1; font-variant-numeric:tabular-nums;}
#pctBig{font-size:38px; font-weight:800; text-align:center; font-variant-numeric:tabular-nums; letter-spacing:.5px;}
#bpmSmall{font-size:12px; color:var(--dim); text-align:center; font-variant-numeric:tabular-nums; margin-bottom:4px;}
input[type=range]{width:100%; min-height:44px; accent-color:var(--accent);}
.presets{display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-top:8px;}
.presets button{min-width:0; min-height:42px; padding:0; font-size:13px; font-variant-numeric:tabular-nums;}
.seg{display:flex; background:var(--card2); border:1px solid var(--line); border-radius:13px; padding:4px; gap:4px;}
.seg button{flex:1; border:none; background:transparent; min-height:42px;}
.seg button.on{background:var(--fg); color:var(--bg); box-shadow:none; border-radius:10px;}
#sections{display:flex; flex-wrap:wrap; gap:8px;}
#sections button{font-size:13px; text-align:left; line-height:1.3; padding:9px 13px;}
#sections .sub{display:block; font-size:10.5px; color:var(--dim); font-weight:500; font-variant-numeric:tabular-nums; font-style:normal;}
.trainer{display:flex; align-items:center; gap:10px; font-size:13px; margin-top:10px; color:var(--dim);}
.trainer input{
  background:var(--card2); color:var(--fg); border:1px solid var(--line);
  border-radius:10px; font:inherit; font-size:15px; padding:8px; min-height:42px;
  width:60px; text-align:center;
}
</style>

  <div class="trainer">
    <button id="btnTrainer">Trainer</button>
    <span>+1% every</span><input type="number" id="trainN" value="4" min="1" max="99">
    <span>loops</span>
  </div>
</div>

<div class="card">
  <h3>Backing</h3>
  <div class="seg">
    <button data-back="off">Off</button>
    <button data-back="click">Click</button>

  </div>
</div>

<div class="card">
  <h3>Sections</h3>
  <div id="sections"></div>
</div>
</div>

/* ---------------- state ---------------- */
const LS = 'shredlooper.v1.';
let song = null;
let notes = [];
let totalBeats = 0;
let ctx = null, master = null, leadGain = null, backGain = null;
let playBus = null;         // per-play gain: pause/stop silences instantly
let drumBufs = {};
let playing = false, warmed = false;
let token = 0;              // intent token: bump cancels in-flight play/sched
let V0 = 0, T0 = 0, spb = 0.5, schedV = 0;
let curBeat = 0;
let loopOn = false, loopA = 0, loopB = 0;
let pct = 100, backing = 'drums';
let trainerOn = false, loopCount = 0;
let schedTimer = null;
const LOOKAHEAD = 0.18, TICK = 30;

const $ = (id) => document.getElementById(id);
const BEND_SCALE = 1, LEAD_VOL = 0.9, BACK_VOL = 0.8;

/* ---------------- persistence ---------------- */
function saveState(){
  try{ localStorage.setItem(LS + song.id, JSON.stringify({
    pct, backing, trainN: +$('trainN').value,
  })); }catch(e){}
}
function loadState(){
  let s = null;
  try{ s = JSON.parse(localStorage.getItem(LS + song.id) || 'null'); }catch(e){}
  pct = s && s.pct || 100;
  loopOn = false; loopA = 0; loopB = 0;   // always init with no loop
  backing = (s && s.backing) || 'drums';
  $('trainN').value = s && s.trainN ? s.trainN : 4;
}

/* ---------------- audio core ---------------- */
function ensureCtx(){
  if(ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  master = ctx.createGain(); master.connect(ctx.destination);
  leadGain = ctx.createGain(); leadGain.connect(master);
  backGain = ctx.createGain(); backGain.connect(master);
  const b64 = (u) => {
    const raw = atob(u.split(',')[1]);
    const a = new Uint8Array(raw.length);
    for(let i = 0; i < raw.length; i++) a[i] = raw.charCodeAt(i);
    return a.buffer;
  };
  for(const k of ['kick','snare','hat']){
    ctx.decodeAudioData(b64(DATA.drums[k]),
      (buf) => { drumBufs[k] = buf; },
      () => { console.warn('drum decode failed', k); });
  }
}
function warmup(){
  const buf = ctx.createBuffer(1, 220, ctx.sampleRate);
  const src = ctx.createBufferSource();
  src.buffer = buf; src.connect(master); src.start();
}
function applyVols(){
  if(!ctx) return;
  leadGain.gain.value = LEAD_VOL;
  backGain.gain.value = BACK_VOL;
}

/* pluck voice: dual detuned saws -> lowpass with envelope -> gain env */
function pluck(t, note, spbNow){
  const f0 = 440 * Math.pow(2, (note.p - 69) / 12);
  const vel = note.v / 127;
  const dur = Math.max(0.05, note.d * spbNow);
  const o1 = ctx.createOscillator(), o2 = ctx.createOscillator();
  o1.type = 'sawtooth'; o2.type = 'sawtooth';
  o1.detune.value = -7; o2.detune.value = 7;
  const semi2f = (s) => f0 * Math.pow(2, (s * BEND_SCALE) / 12);
  let fStart = f0;
  if(note.bd && note.bd.length && note.bd[0][0] <= 1e-6) fStart = semi2f(note.bd[0][1]);
  o1.frequency.setValueAtTime(fStart, t);
  o2.frequency.setValueAtTime(fStart, t);
  if(note.bd){
    for(const [off, semi] of note.bd){
      if(off <= 1e-6) continue;
      const bt = Math.min(t + off * spbNow, t + dur);
      o1.frequency.linearRampToValueAtTime(semi2f(semi), bt);
      o2.frequency.linearRampToValueAtTime(semi2f(semi), bt);
    }
  }
  const filt = ctx.createBiquadFilter();
  filt.type = 'lowpass'; filt.Q.value = 1.2;
  const c0 = Math.min(11000, 900 + f0 * 7);
  filt.frequency.setValueAtTime(c0, t);
  filt.frequency.exponentialRampToValueAtTime(Math.max(300, f0 * 1.6),
      t + Math.min(0.35, dur));
  const g = ctx.createGain();
  const peak = 0.16 + 0.34 * vel;
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(peak, t + 0.004);
  g.gain.exponentialRampToValueAtTime(Math.max(0.001, peak * 0.35),
      t + Math.max(0.03, Math.min(0.25, dur * 0.6)));
  g.gain.setTargetAtTime(0.0001, t + dur - 0.02, 0.018);
  o1.connect(filt); o2.connect(filt); filt.connect(g); g.connect(playBus);
  o1.start(t); o2.start(t);
  o1.stop(t + dur + 0.2); o2.stop(t + dur + 0.2);
}
function hitDrum(name, t, gain){
  const buf = drumBufs[name];
  if(!buf) return;
  const src = ctx.createBufferSource(); src.buffer = buf;
  const g = ctx.createGain(); g.gain.value = gain;
  src.connect(g); g.connect(playBus);
  src.start(t);
}
function clickTick(t, accent){
  // lower + louder per feedback
  const o = ctx.createOscillator(); o.type = 'square';
  o.frequency.value = accent ? 660 : 440;
  const g = ctx.createGain();
  g.gain.setValueAtTime(accent ? 0.95 : 0.75, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
  o.connect(g); g.connect(playBus);
  o.start(t); o.stop(t + 0.08);
}

/* ---------------- beat clock + scheduler ---------------- */
function secPerBeat(){ return 60 / (song.origBpm * pct / 100); }
function vAt(t){ return V0 + (t - T0) / spb; }
function timeOfV(v){ return T0 + (v - V0) * spb; }
function foldV(v){
  if(!loopOn || loopB - loopA < 0.5 || v < loopA) return v;
  return loopA + ((v - loopA) % (loopB - loopA));
}
function lowerBound(arr, b){
  let lo = 0, hi = arr.length;
  while(lo < hi){ const m = (lo + hi) >> 1; if(arr[m].b < b - 1e-9) lo = m + 1; else hi = m; }
  return lo;
}
function scheduleSegment(songA, songB, vBase){
  let i = lowerBound(notes, songA);
  while(i < notes.length && notes[i].b < songB - 1e-9){
    const n = notes[i];
    pluck(timeOfV(vBase + (n.b - songA)), n, spb);
    i++;
  }
  if(backing !== 'off'){
    let g = Math.ceil((songA - 1e-9) / 0.5) * 0.5;
    for(; g < songB - 1e-9; g += 0.5){
      const t = timeOfV(vBase + (g - songA));
      const inBar = ((g % 4) + 4) % 4;
      if(backing === 'drums'){
        if(inBar === 0 || inBar === 2) hitDrum('kick', t, 1.0);
        if(inBar === 1 || inBar === 3) hitDrum('snare', t, 0.95);
        hitDrum('hat', t, 0.7);
      }else if(Number.isInteger(inBar)){
        clickTick(t, inBar === 0);
      }
    }
  }
}
function schedulerTick(myToken){
  if(myToken !== token || !playing) return;
  const horizon = vAt(ctx.currentTime + LOOKAHEAD);
  while(schedV < horizon){
    const s = foldV(schedV);
    let end = horizon;
    if(loopOn && loopB - loopA >= 0.5 && schedV >= loopA - 1e-9){
      end = Math.min(end, schedV + (loopB - s));
    }
    if(end <= schedV + 1e-9){ schedV += 0.001; continue; }
    scheduleSegment(s, s + (end - schedV), schedV);
    const wrapped = loopOn && loopB - loopA >= 0.5 &&
        foldV(end) < foldV(schedV + 1e-9) - 1e-6;
    schedV = end;
    if(wrapped){
      loopCount++;
      if(trainerOn){
        const N = Math.max(1, +$('trainN').value || 4);
        if(loopCount % N === 0 && pct < 110) setPct(pct + 1, true);
      }
    }
  }
}

/* ---------------- transport ---------------- */
function startPlayback(fromBeat){
  ensureCtx();
  const myToken = ++token;
  const go = () => {
    if(myToken !== token) return;
    warmup();
    playBus = ctx.createGain(); playBus.connect(leadGain);
    applyVols();
    const headroom = warmed ? 0.12 : 0.30;
    warmed = true;
    spb = secPerBeat();
    T0 = ctx.currentTime + headroom;
    V0 = fromBeat; schedV = fromBeat;
    playing = true;
    $('btnPlay').textContent = 'Pause';
    schedulerTick(myToken);
    schedTimer = setInterval(() => schedulerTick(myToken), TICK);
  };
  if(ctx.state === 'suspended') ctx.resume().then(go).catch(go);
  else go();
}
function killVoices(){
  if(schedTimer){ clearInterval(schedTimer); schedTimer = null; }
  if(playBus && ctx){
    playBus.gain.setValueAtTime(0, ctx.currentTime);
    const pb = playBus;
    setTimeout(() => { try{ pb.disconnect(); }catch(e){} }, 60);
  }
  playBus = null;
}
function pause(){
  if(!playing) return;
  curBeat = foldV(vAt(ctx.currentTime));
  ++token; playing = false;
  killVoices();
  $('btnPlay').textContent = 'Play';
}
function stop(){
  ++token;
  curBeat = loopOn ? loopA : 0;
  playing = false;
  killVoices();
  $('btnPlay').textContent = 'Play';
  draw();
}
function togglePlay(){
  if(playing) pause();
  else {
    let b = curBeat;
    if(loopOn && (b < loopA - 8 || b >= loopB)) b = loopA;
    startPlayback(b);
  }
}
function seek(beat){
  beat = Math.max(0, Math.min(totalBeats, beat));
  const wasPlaying = playing;
  if(playing){ ++token; killVoices(); playing = false; }
  curBeat = beat;
  if(wasPlaying) startPlayback(beat);
  draw();
}
function setPct(p, silent){
  pct = Math.max(20, Math.min(110, Math.round(p)));
  $('tempo').value = pct;
  $('pctBig').textContent = pct + '%';
  const bpm = song.origBpm * pct / 100;
  $('bpmSmall').textContent = bpm.toFixed(1) + ' bpm';
  const secs = Math.round(totalBeats * 60 / bpm);
  $('songMeta').textContent = song.totalBars + ' bars · ' +
      Math.floor(secs / 60) + ':' + String(secs % 60).padStart(2, '0') +
      ' · ' + notes.length + ' notes';   // every block: double stops count as 2
  if(playing && ctx){
    const now = ctx.currentTime;
    V0 = vAt(now); T0 = now; spb = secPerBeat();
  }
  if(!silent) saveState();
}

/* ---------------- loop controls ---------------- */
function setLoop(a, b, on){
  loopA = Math.max(0, a); loopB = Math.min(totalBeats, b);
  loopOn = on == null ? true : on;
  updateLoopUI(); saveState(); draw();
}
function clearLoop(){ loopOn = false; loopA = loopB = 0; updateLoopUI(); saveState(); draw(); }
function updateLoopUI(){
  $('btnLoop').classList.toggle('on', loopOn);
  if(loopOn && loopB > loopA){
    const bo = song.barOffset;
    const b1 = (loopA / 4 + 1 + bo), bars = (loopB - loopA) / 4;
    const fmt = (x) => (Math.abs(x - Math.round(x)) < 0.005 ? Math.round(x) : x.toFixed(2));
    $('loopInfo').textContent = 'bar ' + fmt(b1) + ' · ' +
        fmt(bars) + ' bar' + (bars !== 1 ? 's' : '') + ' · loops: ' + loopCount;
  } else $('loopInfo').textContent = '';
}
function shiftLoop(d){ if(loopOn){ setLoop(loopA + d, loopB + d); } }
function resizeLoop(d){ if(loopOn && loopB + d > loopA + 1){ setLoop(loopA, loopB + d); } }

/* ---------------- sections strip: hardest gets its own lane, rest packed non-overlapping ---------------- */
const secStrip = $('sectionsStrip');
let secCtx = secStrip.getContext('2d');
let secHits = [];  // [{a,b,x0,x1,y0,y1}] in CSS px, for tap-to-loop
const SEC_ROW_H = 9, SEC_GAP = 4;
function packRows(items){
  const rows = [];  // each row: last end beat
  const placed = [];
  for(const it of items.slice().sort((a, b) => a.a - b.a)){
    let r = rows.findIndex((end) => it.a >= end - 1e-6);
    if(r === -1){ r = rows.length; rows.push(0); }
    rows[r] = it.b;
    placed.push({ ...it, row: r });
  }
  return { placed, rowCount: Math.max(1, rows.length) };
}
function renderSectionsStrip(){
  const dpr2 = window.devicePixelRatio || 1;
  const others = song.sections;
  const { placed, rowCount } = packRows(others);
  const totalRows = 1 + rowCount;  // hardest lane + packed section lanes
  const cssW = secStrip.clientWidth || lane.clientWidth;
  const cssH = totalRows * SEC_ROW_H + (totalRows - 1) * SEC_GAP;
  secStrip.style.height = cssH + 'px';
  secStrip.width = cssW * dpr2; secStrip.height = cssH * dpr2;
  secCtx.setTransform(dpr2, 0, 0, dpr2, 0, 0);
  secCtx.clearRect(0, 0, cssW, cssH);
  const x = (b) => b / totalBeats * cssW;
  secHits = [];
  const drawBar = (a, b, row, fill, alpha) => {
    const y0 = row * (SEC_ROW_H + SEC_GAP);
    const bx = x(a), bw = Math.max(3, x(b) - x(a));
    secCtx.globalAlpha = alpha;
    secCtx.fillStyle = fill;
    secCtx.beginPath();
    secCtx.roundRect(bx, y0, bw, SEC_ROW_H, 3);
    secCtx.fill();
    secCtx.globalAlpha = 1;
    secHits.push({ a, b, x0: bx, x1: bx + bw, y0, y1: y0 + SEC_ROW_H });
  };
  const hz = song.hardest;
  drawBar(hz.a, hz.b, 0, themeCols.accent, 0.55);
  for(const it of placed) drawBar(it.a, it.b, 1 + it.row, themeCols.dim, 0.35);
}
secStrip.addEventListener('pointerup', (e) => {
  const r = secStrip.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  const hit = secHits.find((h) => px >= h.x0 && px <= h.x1 && py >= h.y0 && py <= h.y1);
  if(hit){ setLoop(hit.a, hit.b, true); loopCount = 0; seek(hit.a); }
});

/* ---------------- canvas ---------------- */
const lane = $('lane');
let laneCtx = lane.getContext('2d');
let staticCanvas = null, dpr = 1, W = 0, H = 0;
let themeCols = null, geom = null;
function renderStatic(){
  dpr = window.devicePixelRatio || 1;
  W = lane.clientWidth; H = lane.clientHeight;
  lane.width = W * dpr; lane.height = H * dpr;
  staticCanvas = document.createElement('canvas');
  staticCanvas.width = W * dpr; staticCanvas.height = H * dpr;
  const c = staticCanvas.getContext('2d');
  c.scale(dpr, dpr);
  const css = getComputedStyle(document.body);
  themeCols = {
    grid: css.getPropertyValue('--line').trim(),
    fg: css.getPropertyValue('--fg').trim(),
    accent: css.getPropertyValue('--accent').trim(),
    dim: css.getPropertyValue('--dim').trim(),
  };
  const stripH = 16, laneH = H - stripH;
  let minP = 127, maxP = 0;
  for(const n of notes){ minP = Math.min(minP, n.p); maxP = Math.max(maxP, n.p); }
  minP -= 2; maxP += 2;
  const x = (b) => b / totalBeats * W;
  const y = (p) => laneH - (p - minP) / (maxP - minP) * (laneH - 8) - 4;
  for(let b = 0; b <= totalBeats; b += 2){
    c.strokeStyle = themeCols.grid;
    c.lineWidth = (b % 4 === 0) ? 1.5 : 0.5;
    c.beginPath(); c.moveTo(x(b), 0); c.lineTo(x(b), laneH); c.stroke();
  }
  c.font = '9px ui-monospace, Menlo, monospace';
  c.fillStyle = themeCols.dim; c.textAlign = 'left';
  const barStep = totalBeats / 4 > 20 ? 2 : 1;
  for(let bar = 0; bar < totalBeats / 4; bar += barStep){
    c.fillText(String(bar + 1 + song.barOffset), x(bar * 4) + 2, H - 4);
  }
  const noteH = Math.max(3, laneH / (maxP - minP) * 0.9);
  geom = { minP, maxP, noteH, laneH };
  for(const n of notes){
    c.fillStyle = themeCols.accent;   // notes lead with the theme's hot color
    c.fillRect(x(n.b), y(n.p) - noteH / 2,
               Math.max(2, n.d / totalBeats * W), noteH);
  }
}
function draw(){
  if(!staticCanvas) return;
  laneCtx.setTransform(1, 0, 0, 1, 0, 0);
  laneCtx.clearRect(0, 0, lane.width, lane.height); // static layer is transparent: must wipe
  laneCtx.drawImage(staticCanvas, 0, 0);
  laneCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const stripH = 16, laneH = H - stripH;
  const x = (b) => b / totalBeats * W;
  if(loopOn && loopB > loopA && geom){
    // loop indication: notes inside the loop take the secondary color
    const y = (p) => geom.laneH - (p - geom.minP) / (geom.maxP - geom.minP) * (geom.laneH - 8) - 4;
    laneCtx.fillStyle = themeCols.fg;
    let i = lowerBound(notes, loopA);
    while(i < notes.length && notes[i].b < loopB - 1e-9){
      const n = notes[i];
      laneCtx.fillRect(x(n.b), y(n.p) - geom.noteH / 2,
                       Math.max(2, n.d / totalBeats * W), geom.noteH);
      i++;
    }
  }
  const b = playing && ctx ? foldV(vAt(ctx.currentTime)) : curBeat;
  laneCtx.fillStyle = themeCols.dim;  // neutral playhead
  laneCtx.globalAlpha = 0.95;
  laneCtx.fillRect(Math.min(x(b), W - 2), 0, 2, laneH);
  laneCtx.globalAlpha = 1;
}
function rafLoop(){
  draw();  // always: no stale overlays after loop toggle/clear
  if(playing){
    if(!loopOn && ctx && vAt(ctx.currentTime) >= totalBeats + 0.5) stop();
    if(loopOn) updateLoopUI();
  }
  requestAnimationFrame(rafLoop);
}

/* lane pointer: drag = set loop (snap half-bar), tap = seek */
let pDown = null, pDrag = false;
lane.addEventListener('pointerdown', (e) => {
  const r = lane.getBoundingClientRect();
  pDown = { x: e.clientX, beat: (e.clientX - r.left) / r.width * totalBeats };
  pDrag = false;
  lane.setPointerCapture(e.pointerId);
});
lane.addEventListener('pointermove', (e) => {
  if(!pDown) return;
  if(Math.abs(e.clientX - pDown.x) > 8) pDrag = true;
  if(pDrag){
    const r = lane.getBoundingClientRect();
    const b2 = (e.clientX - r.left) / r.width * totalBeats;
    const a = Math.floor(Math.min(pDown.beat, b2) / 2) * 2;
    const b = Math.ceil(Math.max(pDown.beat, b2) / 2) * 2;
    if(b > a) setLoop(a, b, true);
  }
});
lane.addEventListener('pointerup', (e) => {
  if(pDown && !pDrag){
    seek(Math.round(pDown.beat / 2) * 2);
  }
  pDown = null; pDrag = false;
});

/* ---------------- songs + sections UI ---------------- */
function fmtBar(beat){
  const v = beat / 4 + 1 + song.barOffset;
  return Math.abs(v - Math.round(v)) < 0.005 ? String(Math.round(v)) : v.toFixed(2);
}
function loadSong(idx){
  stop();
  song = DATA.songs[idx];
  notes = song.notes;
  totalBeats = song.totalBars * 4;
  document.body.dataset.theme = song.theme;
  $('title').textContent = song.emoji + ' ' + song.name;
  const hz = song.hardest;
  const tag = hz.eq16 < 120 ? 'easy' : hz.eq16 < 160 ? 'medium'
            : hz.eq16 < 180 ? 'hard' : 'really hard';
  $('diffline').textContent = tag + ' (' + hz.eq16 + 'e)';
  loadState();
  loopCount = 0;
  curBeat = loopOn ? loopA : 0;
  setPct(pct, true);
  for(const b of document.querySelectorAll('[data-back]'))
    b.classList.toggle('on', b.dataset.back === backing);
  const secWrap = $('sections');
  secWrap.innerHTML = '';
  const mk = (label, a, b, extra) => {
    const btn = document.createElement('button');
    btn.innerHTML = label + '<span class="sub">bar ' + fmtBar(a) + ' → ' +
        Math.ceil(b / 4 + song.barOffset) + ' · ' + ((b - a) / 4) + ' bars' +
        (extra || '') + '</span>';
    btn.onclick = () => { setLoop(a, b, true); loopCount = 0; seek(a); };
    secWrap.appendChild(btn);
  };
  mk('⚡ Hardest', hz.a, hz.b, ' · ≈' + hz.eq16);
  for(const s of song.sections) mk(s.name, s.a, s.b);
  renderStatic(); renderSectionsStrip(); updateLoopUI(); draw();
  saveState();
}

        '<path d="M-24 2 Q0 -6 24 2 L24 4 Q0 -3 -24 4 Z" fill="#a9834a"></path>' +
        '<path d="M3 -12 Q-1 -34 5 -50" stroke="#6f512c" stroke-width="4" fill="none" stroke-linecap="round"></path>' +
        '<g stroke="#4f8a4d" stroke-width="3.2" fill="none" stroke-linecap="round">' +
          '<path d="M5 -50 Q-12 -56 -22 -47"></path>' +
          '<path d="M5 -50 Q-4 -64 -14 -66"></path>' +
          '<path d="M5 -50 Q12 -64 24 -62"></path>' +
          '<path d="M5 -50 Q22 -54 30 -42"></path>' +
        '</g>' +
      '</g>' +
    '</svg>' +
    '<svg viewBox="0 0 60 70" style="position:absolute;right:6px;top:300px;width:84px;height:98px;opacity:.68;overflow:visible">' +
      '<g transform="translate(30,60)">' +
        '<ellipse cx="0" cy="4" rx="24" ry="6" fill="rgba(150,215,225,.22)"></ellipse>' +
        '<path d="M-22 2 Q0 -14 22 2 Z" fill="#cda766"></path>' +
        '<path d="M-22 2 Q0 -5 22 2 L22 4 Q0 -3 -22 4 Z" fill="#a9834a"></path>' +
        '<path d="M-2 -11 Q-5 -30 1 -45" stroke="#6f512c" stroke-width="3.6" fill="none" stroke-linecap="round"></path>' +
        '<g stroke="#4f8a4d" stroke-width="3" fill="none" stroke-linecap="round">' +
          '<path d="M1 -45 Q-16 -50 -24 -40"></path>' +
          '<path d="M1 -45 Q-7 -58 -16 -60"></path>' +
          '<path d="M1 -45 Q14 -56 24 -52"></path>' +
        '</g>' +
      '</g>' +
    '</svg>' +
    '<svg viewBox="0 0 60 30" style="position:absolute;left:16px;top:470px;width:72px;height:36px;opacity:.5">' +
      '<ellipse cx="30" cy="18" rx="22" ry="5" fill="rgba(150,215,225,.2)"></ellipse>' +
      '<path d="M12 16 Q30 6 48 16 Z" fill="#c39f60"></path>' +
    '</svg>'
  );
  if(w === 2) return (
    '<svg style="position:absolute;inset:0;width:100%;height:100%" preserveAspectRatio="xMidYMid slice" viewBox="0 0 390 400">' +
      '<defs><pattern id="owPcb" width="128" height="128" patternUnits="userSpaceOnUse">' +
        '<g fill="none" stroke="#2c8f56" stroke-width="2" stroke-linecap="round" opacity=".5">' +
          '<path d="M0 26 H48 Q60 26 60 38 V96 Q60 108 72 108 H128"></path>' +
          '<path d="M26 0 V34 Q26 48 40 48 H104"></path>' +
          '<path d="M128 74 H86 Q74 74 74 62 V16"></path>' +
          '<path d="M0 108 H24 Q36 108 36 96 V70"></path>' +
        '</g>' +
        '<path d="M0 96 H30" stroke="#b9843f" stroke-width="3" opacity=".4" stroke-linecap="round"></path>' +
        '<g fill="#0a1a12" stroke="#4bbd78" stroke-width="2">' +
          '<circle cx="60" cy="38" r="4.5"></circle><circle cx="40" cy="48" r="4"></circle><circle cx="74" cy="62" r="4"></circle>' +
        '</g>' +
        '<g fill="#46c47a"><circle cx="72" cy="108" r="2.2"></circle><circle cx="26" cy="34" r="2.2"></circle><circle cx="104" cy="48" r="2"></circle></g>' +
      '</pattern></defs>' +
      '<rect width="390" height="400" fill="url(#owPcb)"></rect>' +

  );
  return '<div class="owCurb l"></div><div class="owCurb r"></div>';
}
function renderMap(){
  owWrap.querySelectorAll('.owNode,.owWorldBg,.owFinale').forEach((el) => el.remove());
  const width = owWrap.clientWidth || 390;
  const cx = width / 2, amp = Math.min(90, width * (90 / 390)), rowH = 150, startY = 150;
  const nodes = MAP_STAGES.map((st, i) => {
    const song = st.songId ? DATA.songs.find((s) => s.id === st.songId) : null;
    const isBoss = /boss/i.test(st.label);
    const unlocked = !!song;
    const w = isBoss ? 112 : 96, off = isBoss ? 61 : 50;
    const x = cx + amp * Math.sin(i * 0.9), y = startY + i * rowH;
    return {
      st, song, isBoss, unlocked, world: st.world,
      emoji: song ? song.emoji : st.emoji,
      title: song ? song.name : st.title,
      sub: st.songId ? SUBS[st.songId] : (st.sub || ''),
      cx: x, cy: y, left: x - w / 2, top: y - off, w,
    };
  });
  const totalH = nodes[nodes.length - 1].cy + 300;
  owWrap.style.height = totalH + 'px';

  const worlds = [...new Set(nodes.map((n) => n.world))];
  const bands = worlds.map((wd, wi) => {
    const idxs = nodes.map((n, i) => (n.world === wd ? i : -1)).filter((i) => i >= 0);
    const first = idxs[0], last = idxs[idxs.length - 1];
    const top = wi === 0 ? 0 : Math.round((nodes[first - 1].cy + nodes[first].cy) / 2);
    const bottom = wi === worlds.length - 1 ? totalH : Math.round((nodes[last].cy + nodes[last + 1].cy) / 2);
    return { world: wd, top, height: bottom - top };
  });
  for(const b of bands){
    const bg = document.createElement('div');
    bg.className = 'owWorldBg w' + b.world;
    bg.style.top = b.top + 'px'; bg.style.height = b.height + 'px';
    bg.innerHTML = worldMotif(b.world);
    owWrap.appendChild(bg);
  }

  for(const n of nodes){
    const div = document.createElement('div');
    div.className = 'owNode ' + (n.unlocked ? 'unlocked' : 'locked') + (n.isBoss ? ' boss' : '');
    div.style.left = n.left + 'px'; div.style.top = n.top + 'px'; div.style.width = n.w + 'px';
    const badgeText = n.isBoss ? '👑 BOSS' : n.st.label;
    const subText = n.unlocked ? n.sub : 'Locked';
    div.innerHTML = '<div class="owBadge">' + badgeText + '</div>' +
      '<div class="owBubble">' + n.emoji + '</div>' +
      '<div class="owTitle">' + n.title + '</div>' +
      (subText ? '<div class="owSub">' + subText + '</div>' : '');
    if(n.unlocked) div.onclick = () => showPlay(DATA.songs.findIndex((s) => s.id === n.song.id));
    owWrap.appendChild(div);
  }

  const palette = ['#ff6a5a', '#37c6d0', '#ffd24a', '#6bd18a', '#e0559b', '#6aa8ff'];
  const rnd = (s) => { const v = Math.sin(s * 127.1) * 43758.5453; return v - Math.floor(v); };
  let confetti = '';
  for(let i = 0; i < 22; i++){
    const rg = i % 2 ? [270, 380] : [12, 118];
    const fx = rg[0] + rnd(i * 1.7) * (rg[1] - rg[0]), fy = 28 + rnd(i * 2.9) * 148;
    const rot = Math.round((rnd(i * 3.3) - 0.5) * 120);
    confetti += '<rect x="' + fx.toFixed(1) + '" y="' + fy.toFixed(1) + '" width="5" height="9" rx="1" fill="' +
      palette[i % palette.length] + '" transform="rotate(' + rot + ' ' + (fx + 2.5).toFixed(1) + ' ' + (fy + 4).toFixed(1) +
      ')" opacity=".9"></rect>';
  }
  const finale = document.createElement('div');
  finale.className = 'owFinale';
  finale.innerHTML =
    '<svg viewBox="0 0 390 210" preserveAspectRatio="none" style="width:100%;height:100%;overflow:visible">' +
      '<defs><pattern id="owFin" width="28" height="26" patternUnits="userSpaceOnUse">' +
        '<rect width="28" height="26" fill="#e8e9ee"></rect>' +
        '<rect width="14" height="13" fill="#14161a"></rect>' +
        '<rect x="14" y="13" width="14" height="13" fill="#14161a"></rect>' +
      '</pattern></defs>' +
      confetti +
      '<text x="195" y="180" text-anchor="middle" fill="rgba(255,255,255,.55)" style="font:700 8px ui-monospace,monospace;letter-spacing:3px">FINISH</text>' +
      '<rect x="18" y="176" width="5" height="32" rx="2" fill="#c9ccd4"></rect>' +
      '<rect x="367" y="176" width="5" height="32" rx="2" fill="#c9ccd4"></rect>' +
      '<rect x="0" y="184" width="390" height="22" fill="url(#owFin)" opacity=".92"></rect>' +
    '</svg>';
  owWrap.appendChild(finale);

  const pts = nodes.map((n) => ({ x: n.cx, y: n.cy }));
  let d = 'M ' + pts[0].x.toFixed(1) + ' ' + pts[0].y;
  for(let i = 1; i < pts.length - 1; i++){
    const mx = ((pts[i].x + pts[i + 1].x) / 2).toFixed(1), my = ((pts[i].y + pts[i + 1].y) / 2).toFixed(1);
    d += ' Q ' + pts[i].x.toFixed(1) + ' ' + pts[i].y + ' ' + mx + ' ' + my;
  }
  d += ' L ' + pts[pts.length - 1].x.toFixed(1) + ' ' + pts[pts.length - 1].y;
  owPath.setAttribute('width', width);
  owPath.setAttribute('height', totalH);
  owPath.innerHTML =
    '<path d="' + d + '" fill="none" stroke="rgba(255,176,32,.28)" stroke-width="8" stroke-linecap="round"></path>' +
    '<path d="' + d + '" class="dash" fill="none" stroke="var(--accent)" stroke-width="3" stroke-linecap="round" stroke-dasharray="3 12"></path>';
}
function showPlay(idx){
  $('mapScreen').style.display = 'none';
  $('playScreen').style.display = '';
  loadSong(idx);
}
function showMap(){
  stop();
  $('playScreen').style.display = 'none';
  $('mapScreen').style.display = '';
  document.body.dataset.theme = 'map';
  renderMap();
}

/* ---------------- wiring ---------------- */
$('btnMap').onclick = showMap;

$('btnPlay').onclick = togglePlay;
$('btnStop').onclick = stop;
$('btnLoop').onclick = () => {
  if(loopOn) { loopOn = false; }
  else {
    if(loopB <= loopA){ loopA = 0; loopB = totalBeats; }
    loopOn = true; loopCount = 0;
  }
  updateLoopUI(); saveState(); draw();
};
$('btnClear').onclick = clearLoop;
$('nShiftL').onclick = () => shiftLoop(-2);
$('nShiftR').onclick = () => shiftLoop(2);
$('nSizeD').onclick = () => resizeLoop(-2);
$('nSizeU').onclick = () => resizeLoop(2);
$('tempo').oninput = () => setPct(+$('tempo').value);
for(const b of document.querySelectorAll('.presets button'))
  b.onclick = () => setPct(+b.dataset.pct);
$('btnTrainer').onclick = () => {
  trainerOn = !trainerOn; loopCount = 0;
  $('btnTrainer').classList.toggle('on', trainerOn);
};
for(const b of document.querySelectorAll('[data-back]'))
  b.onclick = () => {
    backing = b.dataset.back;
    for(const x of document.querySelectorAll('[data-back]'))
      x.classList.toggle('on', x === b);
    saveState();
  };
$('trainN').onchange = () => saveState();

document.addEventListener('keydown', (e) => {
  if(e.target.tagName === 'INPUT') return;
  if(e.code === 'Space'){ e.preventDefault(); togglePlay(); }
  else if(e.key === 'ArrowLeft') shiftLoop(-2);
  else if(e.key === 'ArrowRight') shiftLoop(2);
  else if(e.key === '-' || e.key === '_') resizeLoop(-2);
  else if(e.key === '+' || e.key === '=') resizeLoop(2);
  else if(e.key === 'Escape') clearLoop();
});

/* iOS suspends AudioContext on app switch: revive on return */
document.addEventListener('visibilitychange', () => {
  if(!document.hidden && ctx && ctx.state === 'suspended'){
    ctx.resume().then(() => warmup()).catch(() => {});
  }
});
window.addEventListener('resize', () => {
  if(song){ renderStatic(); renderSectionsStrip(); draw(); }
  if($('mapScreen').style.display !== 'none') renderMap();
});

if('serviceWorker' in navigator && location.protocol.startsWith('http')){
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

showMap();
rafLoop();
</script>
